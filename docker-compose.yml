services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
      POSTGRES_DB: scheduler
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler -d scheduler"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://scheduler:scheduler@db:5432/scheduler
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ./apps/web
      args:
        # Baked into the browser bundle at build time (Vite inlines env vars),
        # so this must be the origin the *browser* can reach, not the
        # in-network service name.
        VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  db-data:
